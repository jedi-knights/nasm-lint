# go-semantic-release configuration for nasm-lint.
# Phase 1 of the two-phase release pipeline:
#   1. Analyze conventional commits → determine the next semantic version
#   2. Write CHANGELOG.md and VERSION
#   3. Commit those back to main with [skip ci]
#   4. Push the git tag (e.g. v0.2.0)
#
# Phase 2 (cross-platform binary builds + GitHub Release) is handled by dist.yml,
# triggered automatically by the v* tag pushed here. taiki-e/upload-rust-binary-action
# creates the release and attaches the assets, so semantic-release does not open one.

release_mode: repo
tag_format: "v{{.Version}}"

branches:
  - name: main
    is_default: true
  - name: beta
    prerelease: true
    channel: beta
  - name: alpha
    prerelease: true
    channel: alpha

prepare:
  changelog_file: CHANGELOG.md
  version_file: VERSION

# The Dist workflow (taiki-e) owns GitHub Release creation and asset uploads;
# semantic-release only creates the tag.
github:
  create_release: false
  owner: jedi-knights
  repo: nasm-lint

git_author:
  name: semantic-release-bot
  email: semantic-release-bot@users.noreply.github.com
